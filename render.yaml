services:
  - type: web
    name: raffle-platform
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: raffle-platform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: SUPERADMIN_EMAIL
        sync: false
      - key: SUPERADMIN_PASSWORD
        sync: false
      - key: RESERVATION_MINUTES
        value: "15"

databases:
  - name: raffle-platform-db
    plan: starter
    databaseName: raffle_platform
    user: raffle_platform
